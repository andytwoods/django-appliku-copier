build_settings:
  build_image: dockerfile
  dockerfile_path: Dockerfile
  container_port: 8000
  environment_variables:
    - name: DATABASE_URL
      from_database:
        name: db
        property: connection_url
    - name: CELERY_BROKER_URL
      from_database:
        name: cache
        property: connection_url
    - name: ALLOWED_HOSTS
      from_domains: true
    - name: CSRF_TRUSTED_ORIGINS
      source: manual
    - name: SECRET_KEY
      source: manual
    - name: WEB_CONCURRENCY
      value: "2"

services:
  web:
    command: bash run.sh
  release:
    command: bash release.sh
  worker:
    command: bash worker.sh

databases:
  db:
    type: postgresql_18
  cache:
    type: redis_8
