build_settings:
  build_image: dockerfile
  dockerfile_path: Dockerfile
  container_port: 8000
  environment_variables:
    - name: DATABASE_URL
      from_database:
        name: db
        property: connection_url
    - name: AWS_ACCESS_KEY_ID
      source: manual
    - name: AWS_SECRET_ACCESS_KEY
      source: manual
    - name: AWS_STORAGE_BUCKET_NAME
      source: manual
    - name: AWS_S3_ENDPOINT_URL
      source: manual
    - name: ALLOWED_HOSTS
      from_domains: true
    - name: SECRET_KEY
      source: manual
    - name: WEB_CONCURRENCY
      value: "2"

services:
  web:
    command: bash run.sh
  release:
    command: bash release.sh

databases:
  db:
    type: postgresql_18
