build_settings:
  build_image: dockerfile
  dockerfile_path: Dockerfile
  container_port: 8000
  release_command: bash release.sh
  environment_variables:
    - name: DATABASE_URL
      from_database:
        name: db
        property: private_connection_url
    - name: CELERY_BROKER_URL
      from_database:
        name: broker
        property: connection_url
    - name: ALLOWED_HOSTS
      from_domains: true
    - name: SECRET_KEY
      source: manual
    - name: WEB_CONCURRENCY
      value: "2"

services:
  web:
    command: bash run.sh
  worker:
    command: bash celery-worker.sh
  beat:
    command: bash celery-beat.sh

databases:
  db:
    type: postgresql_17
  broker:
    type: rabbitmq
