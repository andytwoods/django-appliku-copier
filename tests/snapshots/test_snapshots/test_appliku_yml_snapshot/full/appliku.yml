build_settings:
  build_image: dockerfile
  dockerfile_path: Dockerfile
  container_port: 8000
  environment_variables:
    - name: DATABASE_URL
      from_database:
        name: db
        property: private_connection_url
    - name: CELERY_BROKER_URL
      from_database:
        name: cache
        property: connection_url
    - name: AWS_ACCESS_KEY_ID
      source: manual
    - name: AWS_SECRET_ACCESS_KEY
      source: manual
    - name: AWS_STORAGE_BUCKET_NAME
      source: manual
    - name: AWS_S3_ENDPOINT_URL
      source: manual
    - name: EMAIL_HOST
      source: manual
    - name: EMAIL_PORT
      source: manual
    - name: EMAIL_HOST_USER
      source: manual
    - name: EMAIL_HOST_PASSWORD
      source: manual
    - name: SENTRY_DSN
      source: manual
    - name: ALLOWED_HOSTS
      from_domains: true
    - name: CSRF_TRUSTED_ORIGINS
      source: manual
    - name: SECRET_KEY
      source: manual
    - name: WEB_CONCURRENCY
      value: "2"

services:
  web:
    command: bash run.sh
  release:
    command: bash release.sh
  worker:
    command: bash worker.sh
  beat:
    command: bash celery-beat.sh

databases:
  db:
    type: postgresql_18
  cache:
    type: redis_8
